name: rq1_core
primary_metrics:
  - linear_probe
  - retrieval
secondary_metrics:
  - clustering
  - transition_analysis
target_policy:
  classification:
    - mode_id
    - spectral_id
    - coupling_id
    - is_transition_window
  regression:
    - mean_load
rules:
  - Skip degenerate targets and record the reason explicitly.
  - Compare baselines and learned embeddings only under identical splits.
